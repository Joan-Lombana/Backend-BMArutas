name: 🚀 Backend Deploy - NestJS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 1️⃣ Checkout
      # -------------------------------
      - name: 🧩 Checkout del código
        uses: actions/checkout@v4

      # -------------------------------
      # 2️⃣ Node
      # -------------------------------
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.2.0'

      # -------------------------------
      # 3️⃣ Build backend
      # -------------------------------
      - name: 🏗️ Build backend y servicios
        run: |
          cd backend
          npm ci
          npm run build

          cd ../rutas-service
          npm ci
          npm run build

      # -------------------------------
      # 4️⃣ SSH
      # -------------------------------
      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      # -------------------------------
      # 5️⃣ Empaquetar SOLO build
      # -------------------------------
      - name: 📦 Empaquetar proyecto
        run: |
          tar -czf deploy.tar.gz \
            backend/dist \
            backend/package.json \
            backend/package-lock.json \
            backend/tsconfig.json \
            backend/nest-cli.json \
            rutas-service/dist \
            rutas-service/package.json \
            rutas-service/package-lock.json

      # -------------------------------
      # 6️⃣ Subir a servidor
      # -------------------------------
      - name: 🚚 Subir paquete
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          'mkdir -p /tmp/eco_backend/'

          scp -o StrictHostKeyChecking=no deploy.tar.gz \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/eco_backend/

      # -------------------------------
      # 7️⃣ Deploy en servidor
      # -------------------------------
      - name: ⚡ Desplegar en servidor
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '

            ROOT=/home/joan/BMArutas-Backend

            echo "🧹 Limpiando proyecto..."
            rm -rf $ROOT/backend
            rm -rf $ROOT/rutas-service
            mkdir -p $ROOT

            echo "📦 Extrayendo..."
            tar -xzf /tmp/eco_backend/deploy.tar.gz -C $ROOT

            echo "📦 Instalando dependencias backend (PROD ONLY)..."
            cd $ROOT/backend
            npm ci --omit=dev

            echo "📦 Instalando rutas-service..."
            cd $ROOT/rutas-service
            npm ci --omit=dev

            echo "🔁 Reiniciando PM2..."
            cd $ROOT

            pm2 reload ecosystem.config.js --update-env || \
            pm2 start ecosystem.config.js

            pm2 save

            pm2 status

            echo "🎉 Deploy terminado"
          '
















