name: 🚀 Backend Deploy - NestJS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 1️⃣ Checkout
      # -------------------------------
      - name: 🧩 Checkout del código
        uses: actions/checkout@v4

      # -------------------------------
      # 2️⃣ Node
      # -------------------------------
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.2.0'

      # -------------------------------
      # 3️⃣ Build backend
      # -------------------------------
      - name: 🏗️ Construir backend y rutas-service
        run: |
          echo "🏗️ Construyendo backend..."
          cd backend
          npm ci
          npm run build
          cd ..

          echo "🏗️ Construyendo rutas-service..."
          cd rutas-service
          npm ci
          npm run build
          cd ..

      # -------------------------------
      # 4️⃣ SSH
      # -------------------------------
      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      # -------------------------------
      # 5️⃣ Empaquetar
      # -------------------------------
      - name: 📦 Empaquetar proyecto
        run: |
          tar -czf deploy.tar.gz \
            backend/dist \
            backend/package.json \
            backend/package-lock.json \
            rutas-service/dist \
            rutas-service/package.json \
            rutas-service/package-lock.json

      # -------------------------------
      # 6️⃣ Subir a servidor
      # -------------------------------
      - name: 🚚 Subir paquete
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          'mkdir -p /tmp/eco_backend/'

          scp -o StrictHostKeyChecking=no deploy.tar.gz \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/eco_backend/

      # -------------------------------
      # 7️⃣ Deploy real
      # -------------------------------
      - name: ⚡ Desplegar en servidor
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
          
            ROOT=/home/joan/BMArutas-Backend

            echo "🧹 Limpiando proyecto..."
            rm -rf $ROOT/backend
            rm -rf $ROOT/rutas-service
            mkdir -p $ROOT

            echo "📦 Extrayendo..."
            tar -xzf /tmp/eco_backend/deploy.tar.gz -C $ROOT

            echo "📦 Instalando dependencias..."
            cd $ROOT/backend
            npm install --omit=dev

            cd $ROOT/rutas-service
            npm install --omit=dev

            echo "🔁 Reiniciando PM2 con ecosystem..."

            cd $ROOT
            pm2 delete all || true
            pm2 start ecosystem.config.js
            pm2 save

            echo "🔥 STATUS PM2:"
            pm2 status

            echo "🎉 Deploy terminado"
          '
















